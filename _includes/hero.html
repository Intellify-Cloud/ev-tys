<!-- BEGIN: HeroSection -->
<section class="max-w-[1200px] mx-auto px-6 pt-44 pb-24">
  <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 lg:gap-16 items-stretch">

    <!-- Left Column — 40% (5 of 12 cols) -->
    <div class="lg:col-span-5 flex flex-col justify-center z-10 bg-[#EFF2E3] rounded-[16px] p-8 lg:p-12 h-[500px]">
      <span class="text-[#F15A24] font-bold uppercase tracking-[0.05em] text-base mb-4 block">
        {{ site.data.sitetext.hero.eyebrow }}
      </span>
      <h1 class="text-[2.618rem] lg:text-[4.236rem] leading-[1.05] font-extrabold text-[#e05a1e] tracking-[-0.02em] mb-6">
        {{ site.data.sitetext.hero.headline }}
      </h1>
      <p class="text-[1.05rem] lg:text-[1.25rem] leading-[1.618] text-[#2d5c45]/80 mb-4">
        {{ site.data.sitetext.hero.body1 }}
      </p>
      <p class="text-[1.05rem] lg:text-[1.25rem] leading-[1.618] text-[#2d5c45]/80 mb-8">
        {{ site.data.sitetext.hero.body2 }}
      </p>
      <a href="{{ site.baseurl }}/#get-started"
        class="inline-flex items-center justify-center bg-[#F15A24] text-white px-8 py-4 rounded-full font-bold tracking-wide hover:-translate-y-1 transition-transform duration-300">
        {{ site.data.sitetext.hero.button }}
      </a>
    </div>

    <!-- Right Column — 60% (7 of 12 cols) -->
    <div class="lg:col-span-7 relative w-full flex justify-end">
      <div class="w-full h-[500px] rounded-[16px] overflow-hidden relative">
        <img
          alt="Happy couple in a modern South African home"
          class="absolute inset-0 w-full h-full object-cover object-center"
          src="{{ site.baseurl }}/assets/img/hero/hero-box.jpg" />
        <div class="absolute inset-0 bg-gradient-to-t from-[#4D1B36]/20 to-transparent mix-blend-multiply"></div>
      </div>
    </div>

  </div>
</section>
<!-- END: HeroSection -->
