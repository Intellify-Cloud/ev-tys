  text: "Use our Home loan Calculators to work out the size of home loan you are likely to qualify for and what your bond repayments will be."
  section: calculators
  list:
    - title: "Bond Calculator"
      desc: "Calculate the home loan you qualify for."
      icon: fas fa-calculator
      link:
        url: /affordability-calculator
        text: "Calculate"
    - title: "Repayment Calculator"
      desc: "Calculate your monthly bond repayments."
      icon: fas fa-calculator
      link:
        url: /bond-calculator
        text: "Calculate"
    - title: "Transfer Cost Calculator"
      desc: "Calculate your registration and transfer costs."
      icon: fas fa-calculator
      link:
        url: /transfer-cost-calculator
        text: "Calculate"

