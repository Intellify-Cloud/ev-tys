textblock:
  title: "The Process"
  text: ""
  footer: ""
  section: textblock
  list:
  - title: "<strong>Plan</strong> – Get Pre-Approved. We take the time to answer your questions and explain every step of the journey."
    image: "fas fa-circle"
  - title: "<strong>Decide</strong> – Find your dream home and sign an Offer to Purchase."
    image: "fas fa-circle"
  - title: "<strong>Prepare</strong> – We gather the final required supporting documentation from you to ensure a bulletproof application."    
    image: "fas fa-circle"
  - title: "<strong>Apply</strong> – We handle the heavy lifting, applying to all major banks (including your own) at once."    
    image: "fas fa-circle"
  - title: "<strong ng>We negotiate</strong> – We fight to secure the most competitive interest rates and terms from each of the banks."    
    image: "fas fa-circle"
  - title: "<strong>You choose</strong> – Review the offers and select the home-loan package that fits your life best."
    image: "fas fa-circle"

